<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LawNotes Live • KSLU BA LL.B Premium Notes</title>
  <style>
    :root { --green: #10b981; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
    }
    .navbar {
      background: #1e2937;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 22px; font-weight: bold; color: white;
    }
    .support-btn {
      background: var(--green); color: white; border: none;
      padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
    }

    header {
      text-align: center; padding: 40px 20px 20px;
      background: linear-gradient(to bottom, #1e2937, #0f172a);
    }
    header h1 { font-size: 42px; font-weight: 700; margin-bottom: 5px; }

    .main-container {
      max-width: 700px; margin: 20px auto; padding: 0 15px;
    }

    .purchase-card {
      background: #1e2937;
      border-radius: 16px;
      padding: 25px;
      border: 2px solid var(--green);
      margin-bottom: 25px;
    }

    h2 {
      color: var(--green);
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: 600;
      margin: 15px 0 8px;
      display: block;
    }

    select {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      background: #334155;
      color: white;
      border: none;
      font-size: 16px;
    }

    .subjects-box {
      background: #334155;
      border-radius: 12px;
      padding: 10px;
      margin: 15px 0;
      max-height: 320px;
      overflow-y: auto;
    }

    .subject-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 10px;
      border-bottom: 1px solid #475569;
    }
    .subject-item:last-child { border-bottom: none; }

    .folder-section {
      background: #1e2937;
      border: 2px solid #334155;
      border-radius: 16px;
      padding: 20px;
      margin-top: 25px;
    }

    .folder-header {
      color: #94a3b8;
      font-size: 15px;
      margin-bottom: 12px;
      text-align: center;
    }

    .pdf-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #334155;
      padding: 14px 16px;
      margin: 8px 0;
      border-radius: 10px;
    }

    .total-box {
      background: #0f172a;
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      font-size: 23px;
      font-weight: 700;
      color: var(--green);
      margin: 20px 0;
    }

    .buy-btn {
      background: var(--green);
      color: white;
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .buy-btn:hover { background: #059669; }

    .download-btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">
      <span style="font-size:28px;">⚖️</span> LawNotes Live
    </div>
    <button class="support-btn" onclick="window.open('https://wa.me/91636872268','_blank')">Support</button>
  </div>

  <header>
    <h1>KSLU BA LL.B</h1>
    <p>Premium Notes • Updated with New Criminal Laws</p>
  </header>

  <div class="main-container">

    <!-- Purchase Card -->
    <div class="purchase-card">
      <h2>Buy Individual Subject Notes</h2>

      <label>Select Semester</label>
      <select id="semesterSelect" onchange="loadSubjects()">
        <option value="">-- Choose Semester --</option>
        <option value="1">Semester 1</option>
        <option value="2">Semester 2</option>
        <option value="3">Semester 3</option>
        <option value="4">Semester 4</option>
        <option value="5">Semester 5</option>
        <option value="6">Semester 6</option>
        <option value="7">Semester 7</option>
        <option value="8">Semester 8</option>
        <option value="9">Semester 9</option>
        <option value="10">Semester 10</option>
      </select>

      <div id="subjectsContainer" style="display: none;">
        <label style="margin-top:20px;">Select Subjects (₹49 each)</label>
        <div id="subjectsList" class="subjects-box"></div>
      </div>

      <div id="totalBox" class="total-box">Total: ₹0 (0 subjects)</div>

      <button class="buy-btn" onclick="initiatePayment()">
        💰 Buy Selected Notes with Razorpay
      </button>
    </div>

    <!-- Selected Folder (PDFs appear here immediately when checked) -->
    <div class="folder-section">
      <div class="folder-header">📁 Your Selected Notes Folder</div>
      <div id="selectedFolder" style="min-height: 80px;"></div>
    </div>

  </div>

  <!-- Download Section after payment -->
  <div id="downloadSection" class="purchase-card" style="display:none; border-color:#10b981;">
    <h2>✅ Your Purchased Notes</h2>
    <div id="purchasedList"></div>
  </div>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <script>
    let selectedSubjects = [];
    let currentSemester = "";

    const semesterSubjects = {
      "1": ["Contract Law", "Constitutional Law", "Legal Methods", "Law of Torts", "Family Law"],
      "2": ["Special Contract", "Constitutional Law II", "Criminal Law", "Property Law", "Company Law"],
      "3": ["BNSS Unit 1", "BNSS Unit 2", "BNSS Unit 3", "BNSS Unit 4", "Constitutional Law I", "Family Law I", "Law of Torts"],
      "4": ["BNSS Advanced", "Evidence Law", "Civil Procedure", "Labour Law", "Environmental Law"],
      "5": ["BNS", "BSA", "Administrative Law", "IPR", "Tax Law"]
    };

    function loadSubjects() {
      const sem = document.getElementById("semesterSelect").value;
      const container = document.getElementById("subjectsContainer");
      const listDiv = document.getElementById("subjectsList");

      selectedSubjects = [];
      updateFolder();

      if (!sem || !semesterSubjects[sem]) {
        container.style.display = "none";
        return;
      }

      currentSemester = `Semester ${sem}`;
      container.style.display = "block";
      listDiv.innerHTML = "";

      semesterSubjects[sem].forEach(subject => {
        const div = document.createElement("div");
        div.className = "subject-item";
        div.innerHTML = `
          <label style="cursor:pointer; flex:1;">
            <input type="checkbox" onchange="toggleSubject(this, '${subject}')" style="margin-right:12px;">
            ${subject}
          </label>
          <span style="color:#10b981; font-weight:600;">₹49</span>
        `;
        listDiv.appendChild(div);
      });
    }

    function toggleSubject(checkbox, subjectName) {
      if (checkbox.checked) {
        if (!selectedSubjects.includes(subjectName)) {
          selectedSubjects.push(subjectName);
        }
      } else {
        selectedSubjects = selectedSubjects.filter(s => s !== subjectName);
      }
      updateTotal();
      updateFolder();
    }

    function updateTotal() {
      const total = selectedSubjects.length * 49;
      document.getElementById("totalBox").innerHTML = 
        `Total: ₹\( {total} ( \){selectedSubjects.length} subjects)`;
    }

    function updateFolder() {
      const folder = document.getElementById("selectedFolder");
      folder.innerHTML = "";

      if (selectedSubjects.length === 0) {
        folder.innerHTML = `<p style="text-align:center; color:#64748b; padding:20px;">No notes selected yet.<br>Select subjects above.</p>`;
        return;
      }

      selectedSubjects.forEach(subject => {
        const div = document.createElement("div");
        div.className = "pdf-item";
        div.innerHTML = `
          <div>
            <strong>${subject}</strong><br>
            <small style="color:#94a3b8;">${currentSemester} • ₹49</small>
          </div>
          <span style="color:#10b981; font-weight:600;">PDF</span>
        `;
        folder.appendChild(div);
      });
    }

    function initiatePayment() {
      if (selectedSubjects.length === 0) {
        alert("Please select at least one subject!");
        return;
      }

      const amountPaise = selectedSubjects.length * 49 * 100;

      const options = {
        "key": "YOUR_RAZORPAY_KEY_ID",   // ← Replace with your real Razorpay Key ID
        "amount": amountPaise,
        "currency": "INR",
        "name": "LawNotes Live",
        "description": `${currentSemester} Notes`,
        "image": "https://via.placeholder.com/128/2563eb/ffffff?text=⚖️",
        "handler": function (response) {
          alert(`✅ Payment Successful! ₹${selectedSubjects.length * 49} paid.\n\nYour notes are now ready to download.`);
          showPurchasedNotes();
        },
        "prefill": { "name": "", "email": "", "contact": "" },
        "notes": {
          "semester": currentSemester,
          "subjects": selectedSubjects.join(", ")
        },
        "theme": { "color": "#10b981" }
      };

      const rzp = new Razorpay(options);
      rzp.on('payment.failed', function (res) {
        alert("Payment Failed: " + res.error.description);
      });
      rzp.open();
    }

    function showPurchasedNotes() {
      const section = document.getElementById("downloadSection");
      const list = document.getElementById("purchasedList");
      list.innerHTML = "";

      selectedSubjects.forEach(subject => {
        const div = document.createElement("div");
        div.className = "pdf-item";
        div.innerHTML = `
          <div>
            <strong>${subject}</strong><br>
            <small>${currentSemester} • ₹49</small>
          </div>
          <button class="download-btn" onclick="downloadPDF('${subject}')">📥 Download PDF</button>
        `;
        list.appendChild(div);
      });

      section.style.display = "block";
      section.scrollIntoView({ behavior: "smooth" });
    }

    function downloadPDF(subjectName) {
      alert(`Downloading ${subjectName}.pdf\n\n(Replace this alert with real download link later)`);
      // Real link example: window.open("https://your-link.com/" + subjectName + ".pdf", "_blank");
    }
  </script>

  <footer>
    <p>Karnataka State Law University (KSLU) • Hubballi</p>
    <p>Admin: Ramesh | Contact: +91 6368 72268 (WhatsApp only)</p>
    <button onclick="window.open('https://wa.me/91636872268','_blank')" 
            style="background:#10b981;color:white;padding:14px 30px;border:none;border-radius:10px;margin-top:15px;cursor:pointer;">
      💬 WhatsApp Support
    </button>
  </footer>

</body>
</html>
