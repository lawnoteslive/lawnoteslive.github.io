<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>LawNotes Live • KSLU BA LL.B Premium Notes</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 10% 20%, #0f0f1a, #05050c);
      color: #eef2ff;
      min-height: 100vh;
      padding-bottom: 3rem;
    }

    .header {
      background: rgba(22, 33, 62, 0.95);
      backdrop-filter: blur(8px);
      padding: 14px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #334155;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .logo {
      font-size: 26px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #c084fc, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .support-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 9px 22px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .support-btn:hover {
      background: #059669;
      transform: scale(1.02);
    }

    .main {
      max-width: 820px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(2px);
      border-radius: 28px;
      padding: 28px 26px;
      margin-bottom: 24px;
      border: 1px solid #334155;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
    }

    .title {
      text-align: center;
      font-size: 30px;
      margin-bottom: 20px;
      font-weight: 700;
      background: linear-gradient(120deg, #e0d6ff, #c4b5fd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    label {
      display: block;
      margin: 12px 0 8px;
      font-weight: 600;
      color: #b9c7db;
    }

    select {
      width: 100%;
      padding: 14px 18px;
      background: #0f172f;
      color: #f1f5f9;
      border: 2px solid #f59e0b;
      border-radius: 18px;
      font-size: 16px;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: #a855f7;
    }

    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .subject-card {
      background: #1e2a3e;
      padding: 16px 8px;
      border-radius: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      font-weight: 600;
      border: 1px solid #475569;
    }

    .subject-card:hover {
      background: #2d3a52;
      transform: translateY(-4px);
      border-color: #f59e0b;
    }

    .folder {
      background: rgba(15, 25, 45, 0.85);
      border-radius: 24px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid #334155;
    }

    .folder h3 {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #facc15;
      margin-bottom: 16px;
      font-size: 1.3rem;
    }

    .selected-list {
      max-height: 260px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .pdf-item-mini {
      background: #0f172f;
      padding: 12px 14px;
      margin: 8px 0;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid #10b981;
    }

    .empty-folder {
      color: #94a3b8;
      text-align: center;
      padding: 20px;
      font-style: italic;
    }

    .total {
      background: linear-gradient(145deg, #0f172a, #16213e);
      border: 2px solid #10b981;
      border-radius: 28px;
      padding: 22px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
      color: #6ee7b7;
      margin: 20px 0;
    }

    .buy-btn {
      width: 100%;
      background: linear-gradient(95deg, #1e2937, #0f172a);
      color: white;
      border: 2px solid #34d399;
      padding: 18px;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s;
    }

    .buy-btn:not(:disabled):hover {
      background: #10b981;
      border-color: white;
      transform: scale(1.01);
      box-shadow: 0 8px 20px rgba(16,185,129,0.3);
    }

    .buy-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(6px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      background: #1e293b;
      width: 100%;
      max-width: 620px;
      border-radius: 32px;
      padding: 28px;
      border: 1px solid #f59e0b;
      box-shadow: 0 30px 40px rgba(0,0,0,0.5);
    }

    .pdf-item-modal {
      background: #0f172f;
      padding: 12px 18px;
      margin: 12px 0;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: 0.1s;
    }

    .pdf-item-modal input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .pdf-item-modal label {
      margin: 0;
      cursor: pointer;
      flex: 1;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 28px;
    }

    .btn-cancel, .btn-add {
      padding: 12px 28px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-cancel { background: #334155; color: white; }
    .btn-cancel:hover { background: #475569; }
    .btn-add { background: #f59e0b; color: #0f172a; font-weight: 700; }
    .btn-add:hover { background: #fbbf24; transform: scale(1.02); }

    .remove-item-btn {
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s;
    }
    .remove-item-btn:hover {
      background: #ef4444;
      transform: scale(1.05);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e2937; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">⚖️ LawNotes Live</div>
  <button class="support-btn" onclick="window.open('https://wa.me/639636872268','_blank')">
    💬 WhatsApp Support (+63)
  </button>
</div>

<div class="main">
  <div class="card">
    <h2 class="title">📚 KSLU BA LL.B Notes</h2>
    <label>🎓 Select Semester (1-10)</label>
    <select id="semesterSelect">
      <option value="">-- Choose Semester --</option>
      <option value="1">Semester 1</option>
      <option value="2">Semester 2</option>
      <option value="3">Semester 3</option>
      <option value="4">Semester 4</option>
      <option value="5">Semester 5</option>
      <option value="6">Semester 6</option>
      <option value="7">Semester 7</option>
      <option value="8">Semester 8</option>
      <option value="9">Semester 9</option>
      <option value="10">Semester 10</option>
    </select>

    <div id="subjectsContainer" style="display:none;">
      <label style="margin-top:28px;">📖 Subjects (click to add notes)</label>
      <div id="subjectsGrid" class="subjects-grid"></div>
    </div>
  </div>

  <div class="folder" id="folderSection" style="display:none;">
    <h3>📁 Your Selected Materials</h3>
    <div id="selectedMaterials" class="selected-list"></div>
  </div>

  <div class="total" id="totalBox">
    💰 Total: ₹0 (0 PDFs)
  </div>

  <button class="buy-btn" id="buyBtn" disabled>
    🔐 Secure Payment with Razorpay
  </button>
</div>

<!-- Modal for selecting PDFs -->
<div id="materialModal" class="modal">
  <div class="modal-content">
    <h2 id="modalSubjectTitle" style="text-align:center; margin-bottom:20px; color:#facc15;"></h2>
    <div id="modalMaterialsList"></div>
    <div class="btn-group">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-add" onclick="addSelectedToFolder()">➕ Add to Folder</button>
    </div>
  </div>
</div>

<script>
  // ======================== KSLU BA LL.B SEMESTER DATA (ACCURATE) ========================
  const semesterData = {
    "1": { subjects: ["Legal Methods", "Law of Torts", "Contract Law - I", "Constitutional Law - I", "Family Law - I (Hindu Law)"] },
    "2": { subjects: ["Special Contract", "Constitutional Law - II", "Criminal Law (BNS/IPC)", "Property Law", "Company Law"] },
    "3": { subjects: ["Administrative Law", "Contract Law - II", "Family Law - II", "Labour Law - I", "Jurisprudence"] },
    "4": { subjects: ["Criminal Procedure Code (BNSS)", "Evidence Law (BSA)", "Civil Procedure Code", "Taxation Law", "Environmental Law"] },
    "5": { subjects: ["Public International Law", "Human Rights Law", "Banking Law", "IPR Law", "Competition Law"] },
    "6": { subjects: ["Labour Law - II", "Family Law - II (Mohammedan Law)", "Administrative Law", "Company Law", "Property Law"] },
    "7": { subjects: ["Criminal Law - II (BNSS)", "Professional Ethics", "Jurisprudence", "Taxation Law", "Labour Law - I"] },
    "8": { subjects: ["Public International Law", "Human Rights / Insurance Law", "Banking Law / RTI", "ADR System", "International Organisations"] },
    "9": { subjects: ["CPC & Limitation Act", "IPR / Penology", "Competition Law / Health Law", "Interpretation of Statutes", "Drafting, Pleading & Conveyance"] },
    "10": { subjects: ["Law of Evidence (BSA)", "Comparative Constitutions", "White Collar Crimes", "Private International Law", "Moot Court & Internship"] }
  };

  // PDF variants (each ₹49)
  const PDF_TEMPLATES = [
    { name: "📄 Detailed Notes", price: 49 },
    { name: "⚖️ Important Cases", price: 49 },
    { name: "📝 Previous Year Questions", price: 49 },
    { name: "📜 Key Provisions & Bare Act", price: 49 },
    { name: "📊 Quick Summary Charts", price: 49 }
  ];

  // Global state
  let selectedPDFs = [];      // each item: { subject, pdfName, price }
  let currentSubjectForModal = "";

  // DOM elements
  const semesterSelect = document.getElementById("semesterSelect");
  const subjectsContainer = document.getElementById("subjectsContainer");
  const subjectsGrid = document.getElementById("subjectsGrid");
  const folderSection = document.getElementById("folderSection");
  const selectedMaterialsDiv = document.getElementById("selectedMaterials");
  const totalBox = document.getElementById("totalBox");
  const buyBtn = document.getElementById("buyBtn");
  const modal = document.getElementById("materialModal");
  const modalSubjectTitle = document.getElementById("modalSubjectTitle");
  const modalMaterialsList = document.getElementById("modalMaterialsList");

  // Helper: escape HTML to prevent injection
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Render selected items & update total + button state
  function renderSelectedAndTotal() {
    if (!selectedMaterialsDiv) return;

    if (selectedPDFs.length === 0) {
      selectedMaterialsDiv.innerHTML = `<div class="empty-folder">✨ No notes added yet. Click on any subject to add PDFs.</div>`;
    } else {
      selectedMaterialsDiv.innerHTML = "";
      selectedPDFs.forEach((item, idx) => {
        const div = document.createElement("div");
        div.className = "pdf-item-mini";
        div.innerHTML = `
          <span><strong>${escapeHtml(item.subject)}</strong> — ${escapeHtml(item.pdfName)}</span>
          <span style="color:#facc15; font-weight:600;">₹${item.price}</span>
          <button class="remove-item-btn" data-index="${idx}">✕</button>
        `;
        selectedMaterialsDiv.appendChild(div);
      });

      // attach remove event listeners
      document.querySelectorAll(".remove-item-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const index = parseInt(btn.getAttribute("data-index"));
          if (!isNaN(index) && index >= 0 && index < selectedPDFs.length) {
            selectedPDFs.splice(index, 1);
            renderSelectedAndTotal();
          }
        });
      });
    }

    const totalAmount = selectedPDFs.reduce((sum, p) => sum + p.price, 0);
    const count = selectedPDFs.length;
    totalBox.innerHTML = `💰 Total: ₹${totalAmount} (${count} PDF${count !== 1 ? 's' : ''} selected)`;
    buyBtn.disabled = (count === 0);
  }

  // Load semester subjects into grid
  function loadSemester() {
    const sem = semesterSelect.value;
    if (!sem) {
      subjectsContainer.style.display = "none";
      folderSection.style.display = "none";
      return;
    }

    const subjectsArray = semesterData[sem]?.subjects;
    if (!subjectsArray || subjectsArray.length === 0) {
      subjectsGrid.innerHTML = `<div style="padding:20px; text-align:center;">⚠️ No subjects data for this semester</div>`;
      subjectsContainer.style.display = "block";
      folderSection.style.display = "block";
      return;
    }

    subjectsGrid.innerHTML = "";
    subjectsArray.forEach(subject => {
      const card = document.createElement("div");
      card.className = "subject-card";
      card.innerHTML = `<span>📘 ${escapeHtml(subject)}</span>`;
      card.addEventListener("click", () => openMaterialModal(subject));
      subjectsGrid.appendChild(card);
    });

    subjectsContainer.style.display = "block";
    folderSection.style.display = "block";
  }

  // Open modal with PDF checkboxes for the chosen subject
  function openMaterialModal(subject) {
    currentSubjectForModal = subject;
    modalSubjectTitle.innerText = `📌 ${subject}`;
    modalMaterialsList.innerHTML = "";

    PDF_TEMPLATES.forEach((template, idx) => {
      const div = document.createElement("div");
      div.className = "pdf-item-modal";
      const uniqueId = `pdf_${subject.replace(/\s/g, '_')}_${idx}`;
      div.innerHTML = `
        <input type="checkbox" id="${uniqueId}" data-pdf-name="${escapeHtml(template.name)}" data-price="${template.price}">
        <label for="${uniqueId}">${escapeHtml(template.name)} — <span style="color:#facc15;">₹${template.price}</span></label>
      `;
      modalMaterialsList.appendChild(div);
    });

    modal.style.display = "flex";
  }

  // Add checked PDFs to global selectedPDFs array
  function addSelectedToFolder() {
    const checkboxes = modalMaterialsList.querySelectorAll("input[type='checkbox']:checked");
    if (checkboxes.length === 0) {
      // subtle notification
      const toast = document.createElement("div");
      toast.innerText = "⚠️ Please select at least one PDF";
      toast.style.position = "fixed";
      toast.style.bottom = "20px";
      toast.style.left = "50%";
      toast.style.transform = "translateX(-50%)";
      toast.style.background = "#f59e0b";
      toast.style.color = "#0f172a";
      toast.style.padding = "10px 20px";
      toast.style.borderRadius = "40px";
      toast.style.fontWeight = "bold";
      toast.style.zIndex = "9999";
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 1800);
      return;
    }

    checkboxes.forEach(cb => {
      const pdfName = cb.getAttribute("data-pdf-name");
      const price = parseInt(cb.getAttribute("data-price"));
      if (pdfName && !isNaN(price)) {
        selectedPDFs.push({
          subject: currentSubjectForModal,
          pdfName: pdfName,
          price: price
        });
      }
      cb.checked = false; // uncheck after adding
    });

    renderSelectedAndTotal();
    closeModal();
  }

  function closeModal() {
    modal.style.display = "none";
    currentSubjectForModal = "";
  }

  // ------------------ RAZORPAY PAYMENT ------------------
  // 🔴 IMPORTANT: Replace with your actual Razorpay Key ID from https://dashboard.razorpay.com/app/keys
  // For testing you can use a test key, but for production use live key.
  const RAZORPAY_KEY_ID = "rzp_test_6tB0KjfQfV2k3L";   // <---- REPLACE WITH YOUR ACTUAL KEY ID

  function initiatePayment() {
    if (selectedPDFs.length === 0) {
      alert("Please add at least one PDF to your folder before payment.");
      return;
    }

    const totalAmountPaise = selectedPDFs.reduce((sum, p) => sum + p.price, 0) * 100;
    if (totalAmountPaise <= 0) return;

    // Build item summary for WhatsApp
    const itemLines = selectedPDFs.map(p => `${p.subject} - ${p.pdfName}`).join("\n");
    const encodedSummary = encodeURIComponent(itemLines);

    const options = {
      key: RAZORPAY_KEY_ID,
      amount: totalAmountPaise,
      currency: "INR",
      name: "LawNotes Live",
      description: `KSLU BA LL.B Notes (${selectedPDFs.length} items)`,
      image: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
      handler: function (response) {
        const paymentId = response.razorpay_payment_id;
        const whatsappMsg = `✅ Payment Successful!%0APayment ID: ${paymentId}%0ATotal: ₹${totalAmountPaise/100}%0A%0ASelected Notes:%0A${encodedSummary}%0A%0AThank you for purchasing from LawNotes Live! Your PDFs will be sent via WhatsApp/Email within 5 minutes.`;
        window.open(`https://wa.me/639636872268?text=${whatsappMsg}`, '_blank');
        alert(`✅ Payment Successful!\nPayment ID: ${paymentId}\nOur team will deliver your notes shortly.`);
        // Optional: clear cart after successful payment (uncomment if needed)
        // selectedPDFs = [];
        // renderSelectedAndTotal();
      },
      prefill: {
        name: "Law Student",
        email: "student@lawnotes.com",
        contact: "9999999999"
      },
      theme: {
        color: "#10b981"
      },
      modal: {
        ondismiss: function() {
          console.log("Payment modal closed");
        }
      }
    };

    const rzp = new Razorpay(options);
    rzp.on('payment.failed', function (response) {
      alert(`❌ Payment Failed: ${response.error.description || "Unknown error"}\nPlease try again or contact WhatsApp support.`);
      console.error(response.error);
    });
    rzp.open();
  }

  // Event listeners
  semesterSelect.addEventListener("change", loadSemester);
  buyBtn.addEventListener("click", initiatePayment);

  // Close modal if clicking outside content
  window.addEventListener("click", (e) => {
    if (e.target === modal) {
      closeModal();
    }
  });

  // initial empty render
  renderSelectedAndTotal();

  // console warning if demo key is still present (just for awareness)
  if (RAZORPAY_KEY_ID === "rzp_test_6tB0KjfQfV2k3L") {
    console.warn("⚠️ Using demo Razorpay key. Replace with your actual Razorpay Key ID from dashboard.razorpay.com for live payments.");
  }
</script>
</body>
</html>
